# USB cameras. List available cameras and their indices with:
#   python -m so101.cameras --list
#
# `index_or_path` is the OpenCV camera index (0, 1, 2, ...) on Windows.
# If indices shuffle between reboots, you can usually pin a device path instead.
#
# Keep every camera at the same fps as the recording loop in config/teleop.yaml.
#
# Detected on this machine: index 0 = desk webcam, index 1 = wrist gripper cam,
# index 2 = OBS Virtual Camera (NOT a real device — don't use it).

cameras:
  # Wrist/gripper-mounted camera — close-up view for the grasp.
  # Mounted upside down, so rotate the image 180 to make it upright.
  gripper:
    index_or_path: 1
    width: 640
    height: 480
    fps: 30
    rotation: 180

  # Fixed camera looking at the whole desk / workspace (the connected webcam).
  desk:
    index_or_path: 0
    width: 640
    height: 480
    fps: 30
