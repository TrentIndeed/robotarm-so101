# USB cameras. List available cameras and their indices with:
#   python -m so101.cameras --list
#
# `index_or_path` is the OpenCV camera index (0, 1, 2, ...) on Windows.
# If indices shuffle between reboots, you can usually pin a device path instead.
#
# Keep every camera at the same fps as the recording loop in config/teleop.yaml.
#
# CURRENT SETUP: one webcam only (used as the desk/overview view). The wrist
# "gripper" camera is commented out until its 3D-printed mount is ready — uncomment
# it and set its real index then. Whatever cameras are listed here are what BOTH the
# real arm and the sim record, so they stay matched.

cameras:
  # Fixed camera looking at the whole desk / workspace (the connected webcam).
  desk:
    index_or_path: 0
    width: 640
    height: 480
    fps: 30

  # Wrist/gripper-mounted camera — close-up view for the grasp.
  # Not connected yet (needs the printed wrist mount). Uncomment when ready and set
  # its index (check with `python -m so101.cameras --list`).
  # gripper:
  #   index_or_path: 1
  #   width: 640
  #   height: 480
  #   fps: 30
