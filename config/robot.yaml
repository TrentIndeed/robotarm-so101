# SO-101 follower arm.
#
# Find the serial port with:  lerobot-find-port
# (Unplug the arm, run it, plug back in, and it tells you which COM port appeared.)

# Windows COM port the Feetech bus (CH343 USB-serial) shows up as.
port: COM3

# A stable, human-readable id for this arm. LeRobot stores the calibration under
# this name, so keep it constant once you've calibrated.
id: so101_follower

# Joints, in order, for the 6-DOF SO-101 follower. These names match LeRobot's
# motor names and are reused by config/teleop.yaml for the Xbox mapping.
# Motor IDs assigned via `lerobot-setup-motors` on 2026-06-25 (done — one-time).
joints:
  - shoulder_pan    # motor ID 1
  - shoulder_lift   # motor ID 2
  - elbow_flex      # motor ID 3
  - wrist_flex      # motor ID 4
  - wrist_roll      # motor ID 5
  - gripper         # motor ID 6
